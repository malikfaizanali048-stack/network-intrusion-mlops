apiVersion: apps/v1
kind: Deployment
metadata:
  name: network-intrusion-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: network-intrusion-api
  template:
    metadata:
      labels:
        app: network-intrusion-api
    spec:
      containers:
      - name: network-intrusion-api
        image: network-intrusion-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: network-intrusion-service
spec:
  type: NodePort
  selector:
    app: network-intrusion-api
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080